name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Linux AMD64
        working-directory: mcp-server-go
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o cube-mcp-linux-amd64 .

      - name: Build Linux ARM64
        working-directory: mcp-server-go
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o cube-mcp-linux-arm64 .

      - name: Generate checksums
        run: |
          cd mcp-server-go
          sha256sum cube-mcp-linux-amd64 cube-mcp-linux-arm64 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mcp-server-go/cube-mcp-linux-amd64
            mcp-server-go/cube-mcp-linux-arm64
            mcp-server-go/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
