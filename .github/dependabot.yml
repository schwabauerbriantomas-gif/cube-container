version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /mcp-server-go
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: docker
    directory: /deploy/container-mode
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
